name: generate pacman

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate pacman.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: anabeatriz630
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#161b22,#0a3069,#0969da,#54aeff,#babbf1&animation=pacman

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
